<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tortas Any | Repostería Artesanal</title>
    <style>
        :root {
            --rosa-pastel: #fce4ec;
            --rosa-oscuro: #ad1457;
            --texto: #333;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background-color: #fffafb;
            color: var(--texto);
        }

        /* Navegación */
        nav {
            background-color: white;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--rosa-oscuro);
            text-decoration: none;
        }

        /* Encabezado */
        header {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(rgba(252, 228, 236, 0.5), rgba(255, 255, 255, 0.5));
        }

        /* Galería */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .card-info {
            padding: 15px;
            text-align: center;
        }

        .card-info h3 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--rosa-oscuro);
        }

        /* --- MODAL (Imagen Completa) --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
            display: flex;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 40px;
            background: #fdfdfd;
            border-top: 1px solid #eee;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">Tortas Any</a>
    </nav>

    <header>
        <h1>Nuestro Catálogo</h1>
        <p>Tradición y sabor en cada detalle</p>
    </header>

    <div class="container">
        <div class="card" onclick="openModal(this)">
            <img src="img/torta-chocolate.jpg" alt="Torta de Chocolate">
            <div class="card-info"><h3>Torta de Chocolate</h3></div>
        </div>

        <div class="card" onclick="openModal(this)">
            <img src="img/pan-de-pascua.jpg" alt="Pan de Pascua">
            <div class="card-info"><h3>Pan de Pascua</h3></div>
        </div>

        <div class="card" onclick="openModal(this)">
            <img src="img/tortillas.jpg" alt="Tortillas con Chicharrones">
            <div class="card-info"><h3>Tortillas con Chicharrones</h3></div>
        </div>

        <div class="card" onclick="openModal(this)">
            <img src="img/lemon-pie.jpg" alt="Lemon Pie">
            <div class="card-info"><h3>Lemon Pie</h3></div>
        </div>
        </div>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="close">&times;</span>
        <img class="modal-content" id="fullImage">
    </div>

    <footer>
        <p>&copy; 2026 Tortas Any - Santiago, Chile</p>
    </footer>

    <script>
        const modal = document.getElementById('imageModal');
        const fullImg = document.getElementById('fullImage');

        function openModal(element) {
            const img = element.querySelector('img');
            fullImg.src = img.src;
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        // Cerrar con tecla Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeModal();
        });
    </script>
</body>
</html>
